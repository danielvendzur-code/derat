<style>
  #derat-frame{position:fixed;bottom:0;right:0;width:138px;height:148px;border:0;z-index:2147483000;background:transparent;display:block;transition:width .4s cubic-bezier(.33,1,.68,1),height .4s cubic-bezier(.33,1,.68,1);will-change:width,height}
  #derat-frame.derat-open{width:470px;height:100vh;height:100dvh}
  @media (max-width:768px){#derat-frame{width:122px;height:130px}#derat-frame.derat-open{width:100%;height:100vh;height:100dvh}}
  #derat-teaser{position:fixed;right:22px;bottom:134px;z-index:2147483001;width:280px;max-width:74vw;background:linear-gradient(180deg,#FFFFFF 0%,#F2FEF8 100%);border:1px solid rgba(41,115,115,.16);border-radius:18px 18px 6px 18px;padding:11px 13px 12px;box-shadow:0 18px 44px rgba(57,57,58,.16),0 2px 8px rgba(57,57,58,.06);font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;opacity:0;transform:translateY(8px) scale(.96);transform-origin:bottom right;transition:opacity .45s ease,transform .45s cubic-bezier(.34,1.4,.64,1);pointer-events:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
  #derat-teaser.derat-show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  #derat-teaser::after{content:"";position:absolute;right:56px;bottom:-7px;width:15px;height:15px;background:#F2FEF8;border-right:1px solid rgba(41,115,115,.16);border-bottom:1px solid rgba(41,115,115,.16);transform:rotate(45deg);border-radius:0 0 3px 0}
  #derat-teaser .dt-tt{font-size:15.5px;font-weight:800;color:#39393A;margin:0 20px 5px 0;line-height:1.28}
  #derat-teaser .dt-tx{font-size:13px;font-weight:500;color:#6B6B6C;line-height:1.5}
  #derat-teaser .dt-tx b{color:#297373;font-weight:800}
  #derat-teaser .dt-x{position:absolute;top:7px;right:8px;width:20px;height:20px;border:none;background:rgba(57,57,58,.05);color:#6B6B6C;border-radius:50%;cursor:pointer;font-size:15px;font-weight:700;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;pointer-events:none;transition:background .2s,color .2s}
  #derat-teaser.derat-show .dt-x{pointer-events:auto}
  #derat-teaser .dt-x:hover{background:rgba(57,57,58,.13);color:#23272A}
  #derat-teaser:focus-visible{outline:3px solid rgba(41,115,115,.28);outline-offset:3px}
  @media (max-width:768px){#derat-teaser{display:none!important}}
  @media (hover:none),(pointer:coarse){#derat-teaser{display:none!important}}
</style>
<div id="derat-teaser" role="button" tabindex="0" aria-hidden="true" aria-label="Otvoriť kalkulačku DERAT">
  <button class="dt-x" type="button" aria-label="Zavrieť">&times;</button>
  <div class="dt-tt">Zistite cenu zásahu na počkanie</div>
  <div class="dt-tx">Otvorte <b>kalkulačku</b> — orientačnú cenu deratizácie či dezinsekcie máte do minúty. Poradí aj náš <b>AI asistent</b>.</div>
</div>
<iframe id="derat-frame" src="https://derat-chatbot-backend.vercel.app/" title="DERAT — AI asistent a kalkulačka" allow="clipboard-write" loading="eager" referrerpolicy="strict-origin-when-cross-origin"></iframe>
<script>
(function(){
  var f=document.getElementById('derat-frame'),t=document.getElementById('derat-teaser'),x=t?t.querySelector('.dt-x'):null;
  if(!f)return;
  var widgetOrigin=new URL(f.src,document.baseURI).origin,dismissed=false,pendingOpen=false,showTimer=0;
  function hideTeaser(){if(showTimer){clearTimeout(showTimer);showTimer=0;}if(t){t.classList.remove('derat-show');t.setAttribute('aria-hidden','true');}}
  function queueTeaser(delay){if(showTimer)clearTimeout(showTimer);showTimer=setTimeout(function(){showTimer=0;if(!dismissed&&t&&!f.classList.contains('derat-open')){t.classList.add('derat-show');t.setAttribute('aria-hidden','false');}},delay);}
  function sendOpen(){try{f.contentWindow.postMessage({source:'derat-parent',type:'open-calc'},widgetOrigin);}catch(err){}}
  function openCalculator(){pendingOpen=true;f.classList.add('derat-open');hideTeaser();sendOpen();setTimeout(sendOpen,120);}
  queueTeaser(2500);
  if(x)x.addEventListener('click',function(e){e.stopPropagation();dismissed=true;hideTeaser();});
  if(t){
    t.addEventListener('click',openCalculator);
    t.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();openCalculator();}});
  }
  window.addEventListener('message',function(e){
    if(e.source!==f.contentWindow||e.origin!==widgetOrigin)return;
    var d=e.data||{};if(d.source!=='derat-chat')return;
    if(d.type==='ready'){if(pendingOpen)sendOpen();return;}
    if(d.open){pendingOpen=false;f.classList.add('derat-open');hideTeaser();}
    else if(d.type==='close'||d.open===false){pendingOpen=false;f.classList.remove('derat-open');if(!dismissed)queueTeaser(600);}
  });
})();
</script>
