  ineSize(v){state.c.ineSize=v;const a=ANIMALS[v],e=$('dr-size-emoji'),l=$('dr-size-lbl'),s=document.querySelector('.dr-size .dr-slider');
    if(e){e.innerHTML=a.e;e.style.transform='scale('+(1+v*0.08)+')';}if(l)l.innerHTML='<b>'+a.n+'</b><span>'+a.sz+'</span>';
    if(s)s.style.setProperty('--p',Math.round(v/(ANIMALS.length-1)*100)+'%');this._livePrice();},
  setVat(gross){state.priceAnim++;state.priceGross=!!gross;const r=compute(),price=gross?r.vat:r.total,low=gross?Math.round(r.low*(1+VAT)):r.low,high=gross?Math.round(r.high*(1+VAT)):r.high;
    document.querySelectorAll('.dr-vat-switch button').forEach((b,i)=>b.classList.toggle('on',i===(gross?1:0)));
    const label=$('dr-price-label'),el=$('dr-price'),range=$('dr-price-range');
    if(label)label.textContent='Orientačná cena '+(gross?'s DPH':'bez DPH');
    if(el){el.dataset.t=price;el.textContent=eur(price);el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
    if(range)range.textContent=priceRange(low,high,gross);},
  checkArea(){this.locationField('psc',state.c.psc);},
  photoPick(e){const f=e.target.files&&e.target.files[0];const box=$('dr-photo-prev');if(!f){state.photo=null;if(box)box.innerHTML='';return;}
    state.photo=f.name;const rd=new FileReader();rd.onload=()=>{if(box)box.innerHTML='<img src="'+rd.result+'" alt=""><span>'+f.name+'</span><button type="button" onclick="DERAT.photoClear()">×</button>';};rd.readAsDataURL(f);},
  photoClear(){state.photo=null;const i=$('dr-photo');if(i)i.value='';const box=$('dr-photo-prev');if(box)box.innerHTML='';},
  area(v){state.c.area=v;const u=unit(),el=$('dr-av');if(el){el.innerHTML=v+' <small>'+u+'</small>';const s=document.querySelector('.dr-slider');if(s){const vol=u==='m³',min=vol?20:10,max=vol?2000:1000;s.style.setProperty('--p',Math.round((v-min)/(max-min)*100)+'%');s.value=v;}document.querySelectorAll('.dr-quick button').forEach(b=>b.classList.toggle('on',b.textContent.trim()===v+' '+u));this._livePrice();}},
  count(d){state.c.count=Math.max(1,Math.min(99,(state.c.count||1)+d));const el=$('dr-cnt');if(el)el.textContent=state.c.count;this._livePrice();},
  addon(id,el){if(!allowedAddons().includes(id))return;const a=state.c.addons,i=a.indexOf(id);i>=0?a.splice(i,1):a.push(id);if(el)el.classList.toggle('sel',i<0);this._livePrice();},
  addonText(v){state.c.addonText=v;},
  next(){state.step<flow().length-1?state.step++:(state.step=0);state.sent=null;render(false);},
  prev(){if(state.step>0)state.step--;render(false);},
  _payload(){const r=compute(),c=state.c,val=id=>{const el=$(id);return el?el.value.trim():'';},raw=id=>{const el=$(id);return el?el.value:'';};
    const okAdds=new Set(allowedAddons());
    const addonNames=[...c.addons.filter(id=>okAdds.has(id)).map(id=>ADDONS[id].n),c.addonText.trim()].filter(Boolean);
    const p={
    sessionId:getSessionId(),source:'derat.sk - kalkulacka',page:document.referrer||location.href,createdAt:new Date().toISOString(),
    name:val('dr-name'),phone:val('dr-phone'),email:val('dr-email'),
    loc:c.loc.trim(),psc:c.psc.trim(),note:val('dr-note'),
    term:raw('dr-term'),pref:raw('dr-pref'),photo:state.photo,
    service:r.sv.name,pest:r.sub.n,place:r.pl.n,size:r.qty+' '+r.unit,count:r.count,discountPct:r.discPct,severity:r.sub.pricing==='fixed'?'-':r.sev.n,multi:r.multi,
    method:r.material?r.material.n:'-',materialQty:r.materialQty||0,materialPrice:r.materialTotal||0,
    visit:r.visit.n,visitSurcharge:r.surcharge,travelKm:r.travel.km||0,travelPrice:r.travel.price,travelNote:r.travel.label,
    addons:addonNames.join(', ')||'žiadne',price:r.total,priceNet:r.total,priceVat:r.vat,priceShown:state.priceGross?r.vat:r.total,priceMode:state.priceGross?'gross':'net',
    priceRange:eur(r.low)+' – '+eur(r.high),priceRangeGross:eur(Math.round(r.low*(1+VAT)))+' – '+eur(Math.round(r.high*(1+VAT))),
    priceEstimate:eur(r.total)+' bez DPH / '+eur(r.vat)+' s DPH'};
    p.configuration=[
      'Služba: '+p.service+' – '+p.pest,
      'Priestor: '+p.place+', '+p.size+(p.count>1?' · '+p.count+' priestorov':''),
      'Miera zamorenia: '+p.severity,
      'Materiál: '+p.method+(p.materialQty?' · '+p.materialQty+' ks':''),
      'Doplnky: '+p.addons,
      'Doprava: '+p.travelNote+(p.travelPrice?' · '+eur(p.travelPrice)+' bez DPH':''),
      'Cena: '+p.priceEstimate
    ].join('\n');
    p.quoteData={sessionId:p.sessionId,service:p.service,pest:p.pest,place:p.place,size:p.size,count:p.count,discountPct:p.discountPct,severity:p.severity,material:p.method,materialQty:p.materialQty,addons:addonNames,visit:p.visit,travelKm:p.travelKm,travelPrice:p.travelPrice,priceNet:p.priceNet,priceVat:p.priceVat,priceRangeNet:p.priceRange,priceRangeGross:p.priceRangeGross,source:p.source,page:p.page,createdAt:p.createdAt};
    /* Číslo dopytu + telo pre /api/send-email (ceny s DPH, históriu NEposiela) */
    p.quoteNum=derQuoteNum();
    const G=v=>Math.round(v*(1+VAT)*100)/100; // netto → brutto (s DPH)
    const items=[{n:r.sv.name+' – '+r.sub.n,q:r.count,u:r.count>1?'priestory':'priestor',up:G(r.perObj),sub:G(r.perObj*r.count)}];
    if(r.materialQty&&r.material)items.push({n:'Materiál: '+r.material.n,q:r.materialQty,u:'ks',up:G(r.material.price),sub:G(r.materialTotal)});
    const addonsList=c.addons.filter(id=>okAdds.has(id)).map(id=>({n:ADDONS[id].n,p:G(ADDONS[id].p||0)}));
    if(r.surcharge)addonsList.push({n:r.visit.n+' (príplatok)',p:G(r.surcharge)});
    p.emailBody={
      from_name:p.name,from_email:p.email,phone:p.phone,message:p.note||'',
      quote_data:{
        num:p.quoteNum,productName:r.sv.name+' – '+r.sub.n,items,
        matTotal:G(r.perObj*r.count),
        discPct:r.discPct||0,discAmount:r.save?G(r.save):0,
        addonsList,
        travel:{km:r.travel.km||0,fee:r.travel.price?G(r.travel.price):0},
        total:r.vat,
        lokacia:(p.loc+(p.psc?' '+p.psc:'')).trim(),
        lang:'sk',
        params:{
          sluzba:r.sv.name,skodca:r.sub.n,priestor:r.pl.n,
          [r.unit==='m³'?'objem':'rozloha']:r.qty+' '+r.unit,
          zamorenie:r.sub.pricing==='fixed'?null:r.sev.n,
          pocet:r.count>1?String(r.count):null,
          doplnky:addonNames.join(', ')||null,
          zlava:r.discPct?('−'+r.discPct+' %'):null,
          cestovne:r.travel.price?(eur2(G(r.travel.price))+(r.travel.km?' (≈'+r.travel.km+' km)':'')):null,
          termin:p.term||null,kontakt:p.pref||null
        }
      }
    };
    p.summary=this._summary(p);p.message=p.summary;return p;},
  _summary(p){return `DOPYT z kalkulačky DERAT.sk
ID dopytu: ${p.sessionId}
Zdroj: ${p.source}
Služba: ${p.service} – ${p.pest}
Priestor: ${p.place}, ${p.size}${p.count>1?' · '+p.count+' priestorov':''}
Zľava: ${p.discountPct||0} %
Miera zamorenia: ${p.severity}${p.multi?' (spravidla potrebné opakované ošetrenie)':''}
Automaticky zvolený materiál: ${p.method}${p.materialQty?' · odhad '+p.materialQty+' ks · '+eur(p.materialPrice):''}
Doplnky: ${p.addons}
Termín zásahu: ${p.visit}${p.visitSurcharge?' · príplatok '+eur(p.visitSurcharge):''}
Doprava: ${p.travelNote}${p.travelPrice?' · '+eur(p.travelPrice)+' bez DPH':''}
---
ORIENTAČNÁ CENA ZÁSAHU: ${eur(p.priceNet)} bez DPH
Rozsah odhadu: ${p.priceRange} bez DPH
S DPH 23 %: približne ${eur(p.priceVat)}
---
Meno: ${p.name}
Telefón: ${p.phone}
E-mail: ${p.email||'-'}
Lokalita: ${p.loc||'-'}${p.psc?' '+p.psc:''}
Súrnosť: ${p.term||'-'}
Kontaktovať: ${p.pref||'-'}
Fotka: ${p.photo?'priložená ('+p.photo+')':'nie'}
Poznámka: ${p.note||'-'}
Stránka: ${p.page}
Čas: ${p.createdAt}`;},
  _valid(p){const st=$('dr-stat');
    if(!p.name||!p.phone){st.className='dr-stat show err';st.textContent='Vyplňte aspoň meno a telefón.';return false;}
    if(!$('dr-consent').checked){st.className='dr-stat show err';st.textContent='Potvrďte prosím súhlas so spracovaním údajov.';return false;}
    return true;},
  _showThanks(p,mode){state.sent=p;const direct=mode==='backend'||mode==='emailjs';
    const lead=document.querySelector('.dr-lead');
    if(lead)lead.innerHTML=`<div class="dr-thanks">
      <div class="dr-thanks-ic">✓</div>
      <h4>${direct?'Dopyt bol odoslaný':'Dopyt je pripravený'}</h4>
      <p>${direct?'Ozveme sa vám zvyčajne do pár hodín.':'Otvorili sme predvyplnený e-mail s kompletným dopytom. Skontrolujte ho a odošlite.'}</p>
      <div class="dr-thanks-price"><span>Orientačná cena zásahu</span><b>${eur(p.priceNet)} bez DPH</b><small>${eur(p.priceVat)} s DPH · rozsah ${p.priceRange}</small></div>
      <div class="dr-thanks-grid"><div><span>Služba</span>${esc(p.service)} – ${esc(p.pest)}</div><div><span>Priestor</span>${esc(p.place)}, ${esc(p.size)}${p.count>1?' · '+p.count+'×':''}</div><div><span>Lokalita</span>${esc(p.loc||'-')}${p.psc?' '+esc(p.psc):''}</div><div><span>Číslo dopytu</span>${esc(p.quoteNum||p.sessionId)}</div></div>
      <div class="dr-thanks-actions"><button onclick="DERAT.newCalc()">Nový výpočet</button><a href="tel:${CONFIG.phone}">Zavolať</a></div>
    </div>`;
    add('Dopyt je pripravený. Orientačná cena zásahu: <b>'+eur(p.priceNet)+' bez DPH</b> ('+eur(p.priceVat)+' s DPH).','bot');
  },
  newCalc(){state.step=0;state.sent=null;state.priceGross=false;state.c.count=1;render(false);},
  send(){const p=this._payload();if(!this._valid(p))return;const st=$('dr-stat'),btn=document.querySelector('.dr-submit');
    const orig=btn.innerHTML;
    btn.innerHTML='<svg class="dr-spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"></circle></svg> Odosielam...';
    btn.style.pointerEvents='none';
    const ok=mode=>{btn.innerHTML='✓ Hotovo';btn.style.background='#297373';st.className='dr-stat show ok';st.textContent=mode==='mailto'||mode==='fallback'?'Dopyt sme pripravili v e-maile.':'Ďakujeme! Dopyt odoslaný — čoskoro sa vám ozveme.';this._showThanks(p,mode);postParent('lead-sent',{sessionId:p.sessionId,priceNet:p.priceNet,priceVat:p.priceVat});};
    const err=(m)=>{btn.innerHTML=orig;btn.style.pointerEvents='auto';st.className='dr-stat show err';st.textContent=m;};
    setTimeout(()=>sendLead(p,ok,()=>err('Odoslanie zlyhalo. Skúste WhatsApp.')),600);},
  sendWa(){const p=this._payload();if(!this._valid(p))return;
    window.open('https://wa.me/'+CONFIG.whatsapp+'?text='+encodeURIComponent(p.summary),'_blank');
    const st=$('dr-stat');st.className='dr-stat show ok';st.textContent='Otvárame WhatsApp s predvyplneným dopytom…';postParent('lead-whatsapp',{sessionId:p.sessionId,priceNet:p.priceNet,priceVat:p.priceVat});}
};
restoreHistory();
initEmbedBridge();
/* zobraz teaser po načítaní (ak ešte nebol otvorený) */
setTimeout(()=>{if(!state.open){const t=$('dr-teaser');if(t)t.classList.add('show');}},1400);
/* info-tooltip ako „portal" priamo v body — nikdy nie je orezaný a pozicuje sa voči viewportu */
const _tipbox=document.createElement('div');_tipbox.id='dr-tipbox';_tipbox.className='dr-tipbox';document.body.appendChild(_tipbox);
/* zatvor info-bublinu pri kliknutí inam alebo pri scrolle */
function _closeTip(){document.querySelectorAll('.dr-ih.on').forEach(x=>x.classList.remove('on'));_tipbox.classList.remove('show');}
document.addEventListener('click',_closeTip);
window.addEventListener('scroll',_closeTip,true);
})();
</script>
</body>
</html>
