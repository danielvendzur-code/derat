<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>DERAT widget</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent}
    #derat-loader{position:fixed;inset:0;display:grid;place-items:center;background:#fff;color:#297373;font:700 14px system-ui,sans-serif}
  </style>
</head>
<body>
  <div id="derat-loader">Načítavam asistenta…</div>
  <script>
  (function(){
    'use strict';

    var MOBILE_CSS = String.raw`
/* === DERAT IOS KEYBOARD FIX v3 === */
@media (max-width:520px){
  html,body{
    width:100%!important;
    height:100%!important;
    min-height:100%!important;
    overflow:hidden!important;
    overscroll-behavior:none!important;
    -webkit-text-size-adjust:100%!important;
  }

  #derat-chat{
    position:fixed!important;
    top:var(--derat-vv-top,0px)!important;
    right:0!important;
    bottom:auto!important;
    left:0!important;
    width:100%!important;
    height:var(--derat-vv-height,100dvh)!important;
    max-height:var(--derat-vv-height,100dvh)!important;
    min-height:0!important;
    border-radius:0!important;
    overflow:hidden!important;
  }

  .dr-msgs,
  .dr-calc,
  .dr-body{
    min-height:0!important;
  }

  .dr-inbar{
    flex:0 0 auto!important;
    margin-bottom:max(8px,env(safe-area-inset-bottom))!important;
  }

  input,
  textarea,
  select,
  .dr-inbar input,
  .dr-ine-txt,
  .dr-addon-custom,
  .dr-volume-calc input{
    font-size:16px!important;
  }

  body.dr-keyboard-open .dr-cbar,
  body.dr-keyboard-open .dr-chips{
    display:none!important;
  }
}
`;

    var MOBILE_JS = `<script>
/* === DERAT IOS KEYBOARD JS v3 === */
(function(){
  if(window.__deratIosKeyboardFixV3) return;
  window.__deratIosKeyboardFixV3=true;

  var root=document.documentElement;
  var mobile=window.matchMedia('(max-width:520px)');
  var timers=[];

  function isField(element){
    if(!element) return false;
    var tag=element.tagName;
    return tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||element.isContentEditable===true;
  }

  function clearTimers(){
    timers.forEach(clearTimeout);
    timers=[];
  }

  function syncViewport(){
    if(!mobile.matches){
      root.style.removeProperty('--derat-vv-height');
      root.style.removeProperty('--derat-vv-top');
      document.body.classList.remove('dr-keyboard-open');
      return;
    }

    var viewport=window.visualViewport;
    var height=Math.max(1,Math.round(viewport?viewport.height:window.innerHeight));
    var top=Math.max(0,Math.round(viewport?viewport.offsetTop:0));
    var keyboardBySize=viewport?(window.innerHeight-viewport.height)>120:false;
    var keyboardOpen=keyboardBySize||isField(document.activeElement);

    root.style.setProperty('--derat-vv-height',height+'px');
    root.style.setProperty('--derat-vv-top',top+'px');
    document.body.classList.toggle('dr-keyboard-open',keyboardOpen);
  }

  function settle(){
    clearTimers();
    syncViewport();
    timers.push(setTimeout(syncViewport,60));
    timers.push(setTimeout(syncViewport,180));
    timers.push(setTimeout(syncViewport,360));
  }

  document.addEventListener('focusin',function(event){
    if(isField(event.target)) settle();
  });

  document.addEventListener('focusout',function(){
    clearTimers();
    timers.push(setTimeout(syncViewport,140));
    timers.push(setTimeout(syncViewport,320));
  });

  window.addEventListener('resize',settle,{passive:true});
  window.addEventListener('orientationchange',function(){
    clearTimers();
    timers.push(setTimeout(syncViewport,120));
    timers.push(setTimeout(syncViewport,360));
  },{passive:true});

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',settle,{passive:true});
    window.visualViewport.addEventListener('scroll',syncViewport,{passive:true});
  }

  syncViewport();
})();
<\/script>`;

    fetch('/index.html?source=widget-v3',{cache:'no-store'})
      .then(function(response){
        if(!response.ok) throw new Error('HTTP '+response.status);
        return response.text();
      })
      .then(function(html){
        var styleEnd=html.lastIndexOf('</style>');
        var bodyEnd=html.lastIndexOf('</body>');
        if(styleEnd<0||bodyEnd<0) throw new Error('Neplatná šablóna widgetu');

        html=html.slice(0,styleEnd)+MOBILE_CSS+'\n'+html.slice(styleEnd);
        bodyEnd=html.lastIndexOf('</body>');
        html=html.slice(0,bodyEnd)+MOBILE_JS+'\n'+html.slice(bodyEnd);

        document.open();
        document.write(html);
        document.close();
      })
      .catch(function(error){
        var loader=document.getElementById('derat-loader');
        if(loader) loader.textContent='Asistenta sa nepodarilo načítať.';
        console.error('[DERAT widget]',error);
      });
  })();
  </script>
</body>
</html>
