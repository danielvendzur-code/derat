name: Run temporary DERAT patch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python scripts/patch_scroll_teaser.py
      - run: |
          git diff --check
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          for i, script in enumerate(re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', html, flags=re.I | re.S)):
              Path(f'/tmp/derat-inline-{i}.js').write_text(script, encoding='utf-8')
          PY
          for file in /tmp/derat-inline-*.js; do node --check "$file"; done
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html embed.html
          git commit -m "Fix Iné step scrolling and center teaser icon"
          git push origin HEAD:main
