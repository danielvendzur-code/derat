name: One-time DERAT widget fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-derat-widget.yml

permissions:
  contents: write

jobs:
  patch-widget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore teaser and compact pest step
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          removed_teaser = '''<!-- Interný teaser odstránený — teaser bublinu zobrazuje embed kód na stránke (embed.html),
               takže sa nikdy nemôžu zobraziť dva teasery naraz. -->'''
          restored_teaser = '''<div id="dr-teaser" onclick="DERAT.openCalc()">
            <button class="dr-teaser-x" onclick="event.stopPropagation();DERAT.hideTeaser()" aria-label="Zavrieť">×</button>
            <div class="dr-teaser-row">
              <span class="dr-teaser-ic"><svg viewBox="0 0 24 24"><path d="M7 2h10a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm0 4v3h10V6H7Zm0 5v2h2v-2H7Zm4 0v2h2v-2h-2Zm4 0v2h2v-2h-2Zm-8 4v2h2v-2H7Zm4 0v2h2v-2h-2Zm4 0v2h2v-2h-2Z"/></svg></span>
              <div class="dr-teaser-tx">
                <b class="dr-teaser-t">Zistite cenu zásahu na počkanie</b>
                <span>Otvorte <b>kalkulačku</b> — orientačnú cenu máte do minúty. <b>AI chatbot</b> poradí ďalší postup.</span>
              </div>
            </div>
          </div>'''

          if removed_teaser in text:
              text = text.replace(removed_teaser, restored_teaser, 1)
          elif 'id="dr-teaser"' not in text:
              raise SystemExit('Interný teaser sa nepodarilo nájsť ani obnoviť.')

          old_body = '''<div class="dr-body ${last||k==='sub'?'can-scroll':'no-scroll'}">'''
          new_body = '''<div class="dr-body ${last||(k==='sub'&&state.c.sub==='ine')?'can-scroll':'no-scroll'}">'''
          if old_body in text:
              text = text.replace(old_body, new_body, 1)
          elif new_body not in text:
              raise SystemExit('Nenašla sa logika scrollovania kroku škodcu.')

          text = text.replace(
              '/* ŠKODCA — 2 stĺpce s ROVNAKOU veľkosťou vždy (aj po výbere „Iné"); krok sa scrolluje */',
              '/* ŠKODCA — bez výberu „Iné“ sa použijú kompaktné 3 stĺpce bez scrollu; „Iné“ môže scrollovať */',
              1,
          )

          marker = '''restoreHistory();
          initEmbedBridge();
          '''
          timer = '''/* zobraz teaser po načítaní v samostatnom preview; v iframe ho initEmbedBridge skryje */
          setTimeout(()=>{if(!state.open){const t=$('dr-teaser');if(t)t.classList.add('show');}},1400);
          '''
          if timer not in text:
              if marker not in text:
                  raise SystemExit('Nenašiel sa bod inicializácie teaseru.')
              text = text.replace(marker, marker + timer, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate HTML JavaScript
        shell: bash
        run: |
          git diff --check
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', html, flags=re.I | re.S)
          if not scripts:
              raise SystemExit('Nenašiel sa inline JavaScript.')
          for i, script in enumerate(scripts):
              Path(f'/tmp/derat-inline-{i}.js').write_text(script, encoding='utf-8')
          print(f'Inline scripts: {len(scripts)}')
          PY
          for file in /tmp/derat-inline-*.js; do node --check "$file"; done
          grep -F 'last||(k==='"'"'sub'"'"'&&state.c.sub==='"'"'ine'"'"')' index.html
          grep -F 'id="dr-teaser"' index.html

      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Restore preview teaser and remove pest-step scroll"
          git push origin HEAD:main
