name: Run final DERAT scroll patch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply final scroll patch
        run: python scripts/patch_scroll_final.py
      - name: Validate
        shell: bash
        run: |
          git diff --check
          python - <<'PY'
          import re
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          assert "last||k==='sub'?'can-scroll':'no-scroll'" in html
          assert "height:0;min-height:0;max-height:100%" in html
          assert "body.scrollTo({top:body.scrollHeight,behavior:'smooth'})" in html
          assert 'scrolling="no"' not in Path('embed.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', html, flags=re.I | re.S)
          for i, script in enumerate(scripts):
              Path(f'/tmp/derat-final-{i}.js').write_text(script, encoding='utf-8')
          PY
          for file in /tmp/derat-final-*.js; do node --check "$file"; done
      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html embed.html
          git commit -m "Make DERAT sub-step reliably scrollable"
          git push origin HEAD:main
