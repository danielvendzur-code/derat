name: Apply mobile keyboard fix

on:
  push:
    paths:
      - .github/workflows/apply-mobile-keyboard-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch index.html
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          css_marker = '/* === DERAT MOBILE KEYBOARD FIX v2 === */'
          css = r'''
/* === DERAT MOBILE KEYBOARD FIX v2 === */
@media (max-width:520px){
  html,body{
    width:100%;
    height:100%;
    min-height:100%;
    overflow:hidden!important;
    overscroll-behavior:none;
    -webkit-text-size-adjust:100%;
  }

  #derat-chat{
    top:var(--derat-vv-top,0px)!important;
    right:0!important;
    bottom:auto!important;
    left:0!important;
    width:100%!important;
    height:var(--derat-vv-height,100dvh)!important;
    max-height:var(--derat-vv-height,100dvh)!important;
    min-height:0!important;
    border-radius:0!important;
    overflow:hidden!important;
  }

  .dr-msgs,
  .dr-calc,
  .dr-body{
    min-height:0!important;
  }

  .dr-inbar{
    flex:0 0 auto!important;
    margin-bottom:max(8px,env(safe-area-inset-bottom))!important;
  }

  input,
  textarea,
  select,
  .dr-inbar input,
  .dr-ine-txt,
  .dr-addon-custom,
  .dr-volume-calc input{
    font-size:16px!important;
  }

  body.dr-keyboard-open .dr-cbar,
  body.dr-keyboard-open .dr-chips{
    display:none!important;
  }
}
'''

          js_marker = '/* === DERAT MOBILE KEYBOARD JS v2 === */'
          js = r'''
<script>
/* === DERAT MOBILE KEYBOARD JS v2 === */
(function(){
  if(window.__deratMobileKeyboardFixV2) return;
  window.__deratMobileKeyboardFixV2=true;

  var root=document.documentElement;
  var mobile=window.matchMedia('(max-width:520px)');
  var timers=[];

  function isTextField(element){
    if(!element) return false;
    var tag=element.tagName;
    return tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||element.isContentEditable===true;
  }

  function clearTimers(){
    timers.forEach(clearTimeout);
    timers=[];
  }

  function syncViewport(){
    if(!mobile.matches){
      root.style.removeProperty('--derat-vv-height');
      root.style.removeProperty('--derat-vv-top');
      document.body.classList.remove('dr-keyboard-open');
      return;
    }

    var viewport=window.visualViewport;
    var height=Math.max(1,Math.round(viewport?viewport.height:window.innerHeight));
    var top=Math.max(0,Math.round(viewport?viewport.offsetTop:0));
    var keyboardBySize=viewport?(window.innerHeight-viewport.height)>120:false;
    var keyboardOpen=keyboardBySize||isTextField(document.activeElement);

    root.style.setProperty('--derat-vv-height',height+'px');
    root.style.setProperty('--derat-vv-top',top+'px');
    document.body.classList.toggle('dr-keyboard-open',keyboardOpen);
  }

  function settleViewport(){
    clearTimers();
    syncViewport();
    timers.push(setTimeout(syncViewport,60));
    timers.push(setTimeout(syncViewport,180));
    timers.push(setTimeout(syncViewport,360));
  }

  document.addEventListener('focusin',function(event){
    if(isTextField(event.target)) settleViewport();
  });

  document.addEventListener('focusout',function(){
    clearTimers();
    timers.push(setTimeout(syncViewport,140));
    timers.push(setTimeout(syncViewport,320));
  });

  window.addEventListener('resize',settleViewport,{passive:true});
  window.addEventListener('orientationchange',function(){
    clearTimers();
    timers.push(setTimeout(syncViewport,120));
    timers.push(setTimeout(syncViewport,360));
  },{passive:true});

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',settleViewport,{passive:true});
    window.visualViewport.addEventListener('scroll',syncViewport,{passive:true});
  }

  syncViewport();
})();
</script>
'''

          if css_marker not in html:
              closing = html.rfind('</style>')
              if closing == -1:
                  raise SystemExit('Closing </style> not found')
              html = html[:closing] + css + '\n' + html[closing:]

          if js_marker not in html:
              closing = html.rfind('</body>')
              if closing == -1:
                  raise SystemExit('Closing </body> not found')
              html = html[:closing] + js + '\n' + html[closing:]

          path.write_text(html, encoding='utf-8')
          PY

      - name: Validate patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('index.html').read_text(encoding='utf-8')
          required=[
            'DERAT MOBILE KEYBOARD FIX v2',
            'DERAT MOBILE KEYBOARD JS v2',
            'font-size:16px!important',
            '--derat-vv-height',
            'visualViewport'
          ]
          missing=[item for item in required if item not in html]
          if missing:
              raise SystemExit('Missing markers: '+', '.join(missing))
          if html.count('<style') != html.count('</style>'):
              raise SystemExit('Unbalanced style tags')
          if html.count('<script') != html.count('</script>'):
              raise SystemExit('Unbalanced script tags')
          print('Mobile keyboard patch validated')
          PY

      - name: Commit patched file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/apply-mobile-keyboard-fix.yml
          git commit -m "Fix iOS keyboard zoom and mobile chat viewport"
          git push
